<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje Espacial</title>
    <style>
        /* Estilos base para el vacío del espacio */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor de las estrellas */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: move-star linear infinite;
        }

        @keyframes move-star {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        /* Contenido principal */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Planeta decorativo */
        .planet {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #3a1c71, #d76d77, #ffaf7b);
            border-radius: 50%;
            margin: 20px auto;
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(215, 109, 119, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="content">
        <div class="planet"></div>
        <h1>EXPLORADOR</h1>
        <p>Perdido en el abismo digital...</p>
    </div>

    <script>
        // Generador de estrellas aleatorias
        const container = document.getElementById('stars-container');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Tamaños aleatorios para simular profundidad
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            
            // Posición inicial aleatoria
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            
            // Velocidad aleatoria (efecto paralaje)
            const duration = Math.random() * 3 + 2;
            star.style.animationDuration = duration + 's';
            star.style.opacity = Math.random();

            container.appendChild(star);
        }

        // Efecto interactivo suave con el mouse
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            container.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
